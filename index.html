<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARST AI - Human Storytelling Script</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .animate-pulse-slow { animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-100 via-indigo-50 to-purple-100 text-slate-800 font-sans antialiased p-4 md:p-8 min-h-screen flex flex-col items-center relative">

    <!-- Tombol Pengaturan -->
    <div class="absolute top-4 right-4 md:top-8 md:right-8 z-50">
        <button id="settingsBtn" class="bg-white p-3 rounded-full shadow-md text-slate-600 hover:text-blue-600 hover:shadow-lg transition-all">
            <i class="ph-fill ph-gear text-2xl"></i>
        </button>
    </div>

    <!-- Modal Pengaturan -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-6 relative">
            <button id="closeSettingsBtn" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors">
                <i class="ph ph-x text-2xl"></i>
            </button>
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 border-b pb-3 text-slate-800">
                <i class="ph-fill ph-gear text-blue-600"></i> Pengaturan
            </h2>
            <div class="mb-6">
                <label for="userApiKey" class="block text-sm font-bold text-slate-700 mb-2">API Key Gemini</label>
                <input type="password" id="userApiKey" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-200 outline-none font-mono text-sm" placeholder="AIzaSyBxxxx...">
            </div>
            <button id="saveSettingsBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">Simpan & Tutup</button>
        </div>
    </div>

    <div class="max-w-3xl mx-auto w-full pb-20">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-3 tracking-tight flex items-center justify-center gap-3">
                <i class="ph-fill ph-magic-wand text-purple-500"></i> ARST AI
            </h1>
            <p class="text-slate-600 font-medium italic">Bikin Narasi Kontenmu Hanya Dengan Beberapa Klik.</p>
        </div>

        <div id="errorMessage" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r-md shadow-sm">
            <p class="font-bold flex items-center gap-2 mb-1"><i class="ph-fill ph-warning-circle"></i> Oops! Ada Masalah:</p>
            <p id="errorText" class="text-sm font-medium"></p>
        </div>

        <!-- INPUT SECTION -->
        <div class="glass-card rounded-3xl shadow-xl border border-white/50 p-6 md:p-8 mb-6 relative overflow-hidden">
            <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2 border-b pb-3">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span> Apa Cerita Hari Ini?
            </h2>

            <div class="mb-6">
                <label for="title" class="block text-sm font-bold text-slate-700 mb-2">Topik atau Masalah Utama</label>
                <input type="text" id="title" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none shadow-inner" placeholder="Contoh: Dompet tipis di akhir bulan tapi pengen kopi enak">
            </div>

            <div class="mb-6 bg-orange-50/50 p-4 rounded-2xl border border-orange-100">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-bold text-slate-700 flex items-center gap-2">
                        <i class="ph ph-shopping-bag"></i> Mode Jualan (Soft-Selling)
                    </label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="productToggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-orange-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                    </label>
                </div>
                <div id="productInputContainer" class="hidden mt-4">
                    <textarea id="productDesc" rows="3" class="w-full px-4 py-3 rounded-xl border border-orange-200 text-sm focus:border-orange-500 outline-none" placeholder="Masukkan Nama Brand & Detail Produk di sini..."></textarea>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label class="block text-sm font-bold text-slate-700 mb-3">Tipe Vibe</label>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" name="type" value="Storytelling" checked> <span class="text-sm">📖 Storytelling Natural</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" name="type" value="POV" checked> <span class="text-sm">👁️ POV Jujur</span></label>
                        <label class="flex items-center space-x-2 cursor-pointer"><input type="checkbox" name="type" value="Edukasi" checked> <span class="text-sm">🧠 Edukasi</span></label>
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label for="duration" class="block text-sm font-bold text-slate-700 mb-2">Target Durasi (Detik)</label>
                    <input type="number" id="duration" value="60" class="w-full px-4 py-3 text-2xl font-bold text-blue-600 text-center rounded-xl border border-slate-200 outline-none">
                </div>
            </div>

            <button id="btnGenerateHook" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center items-center gap-3 transition-all transform hover:-translate-y-1">
                <i class="ph-fill ph-fishing-rod text-xl"></i> <span>Mulai Buat Hook Spontan 🎣</span>
                <div id="loadingHook" class="loader hidden"></div>
            </button>
        </div>

        <!-- HOOK SELECTION -->
        <div id="hookSelectionArea" class="hidden glass-card rounded-3xl shadow-xl border border-white/50 p-6 md:p-8 mb-6 transition-all">
            <h2 class="text-lg font-bold text-slate-800 mb-4 border-b pb-3">Pilih Opsi HOOK</h2>
            <div id="hookList" class="space-y-3 mb-6"></div>
            <button id="btnGenerateScript" disabled class="w-full bg-slate-300 text-slate-500 cursor-not-allowed font-bold py-4 rounded-2xl flex justify-center items-center gap-3 transition-all">
                <i class="ph-fill ph-sparkle text-xl"></i> <span>Lanjut Buat Cerita Lengkap ✨</span>
                <div id="loadingScript" class="loader hidden"></div>
            </button>
        </div>

        <!-- SCRIPT RESULT AREA -->
        <div id="resultArea" class="hidden glass-card rounded-3xl shadow-xl border border-white/50 p-6 md:p-8 mb-6">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-slate-800">Script Human-Story</h2>
                <button id="copyBtn" class="bg-indigo-50 text-indigo-700 py-2 px-4 rounded-xl font-bold border border-indigo-100 text-sm">Salin Semua</button>
            </div>
            <div class="space-y-4">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 group relative">
                    <button onclick="copyToTTS('outHook')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 bg-blue-600 text-white text-[10px] px-2 py-1 rounded-md transition-all">Kirim ke Suara ↓</button>
                    <h3 class="text-[10px] font-bold text-blue-800 uppercase mb-1">Hook Spontan</h3>
                    <div id="outHook" class="text-slate-800 font-bold leading-relaxed"></div>
                </div>
                <div class="bg-purple-50 p-4 rounded-2xl border border-purple-100 group relative">
                    <button onclick="copyToTTS('outNarasi')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 bg-purple-600 text-white text-[10px] px-2 py-1 rounded-md transition-all">Kirim ke Suara ↓</button>
                    <h3 class="text-[10px] font-bold text-purple-800 uppercase mb-1">Narasi Jujur</h3>
                    <div id="outNarasi" class="text-slate-700 leading-relaxed font-medium italic whitespace-pre-wrap"></div>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100 group relative">
                    <button onclick="copyToTTS('outCTA')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 bg-orange-600 text-white text-[10px] px-2 py-1 rounded-md transition-all">Kirim ke Suara ↓</button>
                    <h3 class="text-[10px] font-bold text-orange-800 uppercase mb-1">Kesimpulan (CTA)</h3>
                    <div id="outCTA" class="text-slate-700 font-bold"></div>
                </div>
            </div>
        </div>

        <!-- VOICE GENERATOR AREA -->
        <div class="glass-card rounded-3xl shadow-xl border border-white/50 p-6 md:p-8">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-3 border-b pb-3">
                <i class="ph-fill ph-speaker-hifi text-blue-600"></i> AI Voice Generator
            </h2>
            <div class="space-y-4">
                <textarea id="ttsInput" rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none text-sm leading-relaxed" placeholder="Teks yang akan diubah jadi suara..."></textarea>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="voiceCharacter" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium">
                        <option value="Kore">👩 Kore - Ceria & Energik</option>
                        <option value="Leda">👩 Leda - Lembut (Storytelling)</option>
                        <option value="Puck">👨 Puck - Ramah (Casual)</option>
                        <option value="Fenrir">👨 Fenrir - Berwibawa</option>
                    </select>
                    <select id="voiceTone" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium">
                        <option value="cheerful">Ceria / Semangat</option>
                        <option value="calm">Tenang / Santai</option>
                        <option value="serious">Serius</option>
                    </select>
                </div>
                <button id="btnGenerateTTS" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center items-center gap-3 transition-all hover:brightness-110">
                    <i class="ph-fill ph-play-circle text-xl"></i> <span>Ubah Jadi Suara</span>
                    <div id="loadingTTS" class="loader hidden"></div>
                </button>
                <div id="ttsAudioArea" class="hidden mt-6 p-4 bg-blue-50 border border-blue-200 rounded-2xl animate-pulse-slow">
                    <audio id="ttsAudioPlayer" controls class="w-full"></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('userApiKey');
        let currentInputData = ""; 
        let selectedHookText = ""; 

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('arst_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
        });

        document.getElementById('settingsBtn').onclick = () => settingsModal.classList.remove('hidden');
        document.getElementById('closeSettingsBtn').onclick = () => settingsModal.classList.add('hidden');
        document.getElementById('saveSettingsBtn').onclick = () => {
            localStorage.setItem('arst_api_key', apiKeyInput.value.trim());
            settingsModal.classList.add('hidden');
        };

        window.copyToTTS = (id) => {
            const txt = document.getElementById(id).innerText;
            const current = document.getElementById('ttsInput').value;
            document.getElementById('ttsInput').value = (current ? current + "\n\n" : "") + txt;
            document.getElementById('ttsInput').scrollIntoView({ behavior: 'smooth' });
        };

        // Fungsi Universal Fetch dengan Sistem Retry Otomatis
        async function fetchAI(prompt, model = "gemini-1.5-flash") {
            const key = apiKeyInput.value.trim();
            if (!key) { settingsModal.classList.remove('hidden'); throw new Error("API Key kosong!"); }
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
            
            const delays = [1000, 2000, 4000];
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "Server Error");
                    return data;
                } catch (error) {
                    if (i === delays.length) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        document.getElementById('productToggle').onchange = function() {
            document.getElementById('productInputContainer').classList.toggle('hidden', !this.checked);
        };

        document.getElementById('btnGenerateHook').onclick = async () => {
            const title = document.getElementById('title').value.trim();
            if (!title) return;
            const btn = document.getElementById('btnGenerateHook');
            const loader = document.getElementById('loadingHook');
            btn.disabled = true; loader.classList.remove('hidden');

            const isSelling = document.getElementById('productToggle').checked;
            const product = document.getElementById('productDesc').value.trim();
            const types = Array.from(document.querySelectorAll('input[name="type"]:checked')).map(cb => cb.value).join(', ');

            currentInputData = `Topik: ${title}. Tipe: ${types}. ${isSelling ? 'Produk: ' + product : 'Non-Jualan.'}`;

            const prompt = `Buat 4 opsi HOOK video singkat (3-5 detik) untuk topik: ${title}. 
            Format WAJIB: Gunakan tag <H>Teks Hook</H> untuk setiap opsi. Buat sangat natural dan membuat penasaran.`;

            try {
                const res = await fetchAI(prompt, "gemini-1.5-flash");
                const text = res.candidates[0].content.parts[0].text;
                const hooks = [...text.matchAll(/<H>([\s\S]*?)<\/H>/gi)].map(m => m[1].trim());
                
                const list = document.getElementById('hookList');
                list.innerHTML = "";
                hooks.forEach(h => {
                    const d = document.createElement('div');
                    d.className = "p-4 rounded-xl border-2 border-slate-200 cursor-pointer hover:border-blue-400 hover:bg-blue-50 font-medium text-sm transition-all";
                    d.innerText = h;
                    d.onclick = () => {
                        document.querySelectorAll('#hookList div').forEach(x => x.classList.remove('border-blue-500', 'bg-blue-50', 'ring-2', 'ring-blue-100'));
                        d.classList.add('border-blue-500', 'bg-blue-50', 'ring-2', 'ring-blue-100');
                        selectedHookText = h;
                        document.getElementById('btnGenerateScript').disabled = false;
                        document.getElementById('btnGenerateScript').classList.replace('bg-slate-300', 'bg-blue-600');
                        document.getElementById('btnGenerateScript').classList.replace('text-slate-500', 'text-white');
                    };
                    list.appendChild(d);
                });
                document.getElementById('hookSelectionArea').classList.remove('hidden');
            } catch(e) { showError("Gagal membuat Hook: " + e.message); }
            finally { btn.disabled = false; loader.classList.add('hidden'); }
        };

        document.getElementById('btnGenerateScript').onclick = async () => {
            const btn = document.getElementById('btnGenerateScript');
            const loader = document.getElementById('loadingScript');
            const duration = document.getElementById('duration').value;
            btn.disabled = true; loader.classList.remove('hidden');

            const prompt = `Lanjutkan hook "${selectedHookText}" menjadi naskah lengkap ${duration} detik. 
            Data: ${currentInputData}. Format WAJIB: <NARASI>isi naskah narasi</NARASI> <CTA>ajakan bertindak</CTA>. 
            Gunakan gaya bahasa manusia yang santai, jangan kaku.`;

            try {
                const res = await fetchAI(prompt, "gemini-1.5-flash");
                const text = res.candidates[0].content.parts[0].text;
                
                const narasi = (text.match(/<NARASI>([\s\S]*?)<\/NARASI>/i) || ["",""])[1].trim();
                const cta = (text.match(/<CTA>([\s\S]*?)<\/CTA>/i) || ["",""])[1].trim();

                document.getElementById('outHook').innerText = selectedHookText;
                document.getElementById('outNarasi').innerText = narasi;
                document.getElementById('outCTA').innerText = cta;
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
            } catch(e) { showError("Gagal membuat Narasi: " + e.message); }
            finally { btn.disabled = false; loader.classList.add('hidden'); }
        };

        document.getElementById('btnGenerateTTS').onclick = async () => {
            const text = document.getElementById('ttsInput').value.trim();
            const character = document.getElementById('voiceCharacter').value;
            const tone = document.getElementById('voiceTone').value;
            if (!text) return;

            const btn = document.getElementById('btnGenerateTTS');
            const loader = document.getElementById('loadingTTS');
            btn.disabled = true; loader.classList.remove('hidden');

            const key = apiKeyInput.value.trim();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a ${tone} tone: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: character } } }
                        }
                    })
                });
                const data = await response.json();
                
                const pcm64 = data.candidates[0].content.parts[0].inlineData.data;
                const bin = atob(pcm64);
                const pcm = new Int16Array(bin.length / 2);
                for (let i = 0; i < pcm.length; i++) pcm[i] = bin.charCodeAt(i*2) | (bin.charCodeAt(i*2+1) << 8);

                const wav = pcmToWav(pcm, 24000);
                document.getElementById('ttsAudioPlayer').src = URL.createObjectURL(wav);
                document.getElementById('ttsAudioArea').classList.remove('hidden');
                document.getElementById('ttsAudioPlayer').play();
            } catch(e) { showError("Gagal membuat Suara: " + e.message); }
            finally { btn.disabled = false; loader.classList.add('hidden'); }
        };

        function pcmToWav(pcm, rate) {
            const b = new ArrayBuffer(44 + pcm.length * 2);
            const v = new DataView(b);
            const s = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true); s(8, 'WAVE');
            s(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true);
            v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, pcm.length * 2, true);
            for (let i = 0; i < pcm.length; i++) v.setInt16(44 + i * 2, pcm[i], true);
            return new Blob([v], { type: 'audio/wav' });
        }

        function showError(msg) {
            document.getElementById('errorText').innerText = msg;
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('errorMessage').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('copyBtn').onclick = () => {
            const t = `HOOK:\n${document.getElementById('outHook').innerText}\n\nNARASI:\n${document.getElementById('outNarasi').innerText}\n\nCTA:\n${document.getElementById('outCTA').innerText}`;
            const area = document.createElement('textarea'); area.value = t; document.body.appendChild(area); area.select(); document.execCommand('copy'); document.body.removeChild(area);
            alert("Teks tersalin!");
        };
    </script>
</body>
</html>
